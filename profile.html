<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-24">

    <div class="p-8 text-center bg-gradient-to-b from-gray-800 to-gray-900 border-b border-gray-800">
        <div class="w-24 h-24 bg-blue-600 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold shadow-xl shadow-blue-900/50 border-4 border-gray-700">
            <i class="fas fa-user"></i>
        </div>
        <h2 id="userEmail" class="text-xl font-bold">Loading...</h2>
        <p class="text-blue-400 text-xs font-bold uppercase tracking-widest mt-1">Active Member</p>
    </div>

    <main class="p-6 space-y-4">
        
        <a href="https://t.me/D33446" target="_blank" class="flex items-center p-5 bg-gray-800 rounded-2xl border border-gray-700 hover:border-blue-500 transition shadow-lg">
            <div class="w-12 h-12 bg-blue-500/10 rounded-xl flex items-center justify-center mr-4">
                <i class="fab fa-telegram text-blue-400 text-2xl"></i>
            </div>
            <div class="flex-1">
                <p class="font-bold">Contact Support</p>
                <p class="text-[10px] text-gray-500 uppercase font-black">Chat with @D33446</p>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
        </a>

        <button onclick="resetPass()" class="w-full flex items-center p-5 bg-gray-800 rounded-2xl border border-gray-700 hover:border-yellow-500 transition shadow-lg">
            <div class="w-12 h-12 bg-yellow-500/10 rounded-xl flex items-center justify-center mr-4">
                <i class="fas fa-key text-yellow-500 text-xl"></i>
            </div>
            <div class="text-left flex-1">
                <p class="font-bold">Reset Password</p>
                <p class="text-[10px] text-gray-500 uppercase font-black">Get link via Email</p>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
        </button>

        <button onclick="logout()" class="w-full flex items-center p-5 bg-red-900/10 rounded-2xl border border-red-900/30 hover:bg-red-900/20 transition shadow-lg">
            <div class="w-12 h-12 bg-red-500/10 rounded-xl flex items-center justify-center mr-4">
                <i class="fas fa-sign-out-alt text-red-500 text-xl"></i>
            </div>
            <p class="font-bold text-red-500 flex-1 text-left">Logout</p>
        </button>

    </main>

    <nav class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-4 shadow-2xl">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-tasks text-xl"></i>
            <span class="text-[10px] mt-1 text-center">Tasks</span>
        </button>
        <button onclick="window.location.href='history.html'" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-history text-xl"></i>
            <span class="text-[10px] mt-1 text-center">History</span>
        </button>
        <button class="flex flex-col items-center text-blue-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] mt-1 text-center">Profile</span>
        </button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
            } else {
                window.location.href = "index.html";
            }
        });

        window.logout = () => {
            if(confirm("Are you sure you want to logout?")) {
                signOut(auth).then(() => window.location.href = "index.html");
            }
        };

        window.resetPass = () => {
            sendPasswordResetEmail(auth, auth.currentUser.email)
                .then(() => alert("A password reset link has been sent to your email!"))
                .catch((error) => alert(error.message));
        };
    </script>
</body>
</html>
