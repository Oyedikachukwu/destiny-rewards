<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-32">

    <div id="tgLock" class="fixed inset-0 bg-gray-900 z-[100] flex items-center justify-center p-6 text-center">
        <div class="bg-gray-800 p-8 rounded-3xl border border-blue-500 shadow-2xl max-w-sm w-full">
            <i class="fab fa-telegram text-6xl text-blue-400 mb-4"></i>
            <h2 class="text-2xl font-bold mb-2">Join Our Channel</h2>
            <p class="text-gray-400 text-sm mb-6">Join our official Telegram channel to unlock the dashboard.</p>
            <a href="https://t.me/updatewithdestiny001" target="_blank" class="block w-full bg-blue-600 p-4 rounded-xl font-bold mb-3">1. Join Channel Now</a>
            <button onclick="unlockSite()" class="block w-full border border-gray-600 p-4 rounded-xl font-bold text-xs uppercase">2. I Have Joined</button>
        </div>
    </div>

    <div class="p-4 text-center">
        <p id="userEmail" class="text-[10px] text-gray-500 italic">Loading...</p>
    </div>

    <div class="py-8 text-center bg-gray-800/50 border-b border-gray-800">
        <p class="text-gray-400 text-xs font-bold uppercase tracking-widest">Available Balance</p>
        <h1 id="mainBalance" class="text-5xl font-black text-blue-500 my-2">₦0</h1>
        <span class="bg-green-900/30 text-green-400 text-[10px] px-3 py-1 rounded-full border border-green-800">Verified Account</span>
    </div>

    <main class="p-4 space-y-4">
        
        <div class="bg-gray-800 p-4 rounded-2xl border border-gray-700">
            <div class="flex justify-between items-center mb-2">
                <p class="text-xs text-gray-400 font-bold uppercase">Refer & Earn</p>
                <p class="text-blue-400 font-bold">₦20 per friend</p>
            </div>
            <button onclick="copyRef()" class="w-full bg-blue-600 py-3 rounded-xl text-sm font-bold">Copy Referral Link</button>
            <p id="refLink" class="hidden"></p>
        </div>

        <div class="bg-blue-900/20 border border-blue-500/40 p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center">
                <i class="fab fa-telegram text-blue-400 text-2xl mr-3"></i>
                <div>
                    <h3 class="text-sm font-bold">Official Channel</h3>
                    <p class="text-[9px] text-gray-400 uppercase">Get task updates</p>
                </div>
            </div>
            <a href="https://t.me/updatewithdestiny001" target="_blank" class="bg-blue-600 text-[10px] font-black px-4 py-2 rounded-lg text-center">JOIN</a>
        </div>

        <section class="pt-4">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <i class="fas fa-list-ul mr-2 text-blue-500"></i> Daily Tasks
            </h2>
            <div id="taskList" class="space-y-4">
                <p class="text-center text-gray-600 py-10 text-sm italic">Searching for tasks...</p>
            </div>
        </section>
        
    </main>

        <nav class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-4 shadow-2xl z-50">
        <button onclick="window.location.href='dashboard.html'" class="flex flex-col items-center text-gray-500 hover:text-blue-500">
            <i class="fas fa-tasks text-xl"></i>
            <span class="text-[9px] mt-1">Tasks</span>
        </button>
        <button onclick="window.location.href='withdraw.html'" class="flex flex-col items-center text-gray-500 hover:text-blue-500">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[9px] mt-1">Wallet</span>
        </button>
        <button onclick="window.location.href='history.html'" class="flex flex-col items-center text-gray-500 hover:text-blue-500">
            <i class="fas fa-history text-xl"></i>
            <span class="text-[9px] mt-1">History</span>
        </button>
        <button onclick="window.location.href='profile.html'" class="flex flex-col items-center text-gray-500 hover:text-blue-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[9px] mt-1">Profile</span>
        </button>
    </nav>


    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        window.unlockSite = function() {
            const lock = document.getElementById('tgLock');
            if(lock) {
                lock.style.display = 'none';
                localStorage.setItem('tgJoined', 'true');
            }
        };

        if(localStorage.getItem('tgJoined') === 'true') {
            const lock = document.getElementById('tgLock');
            if(lock) lock.style.display = 'none';
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('refLink').innerText = window.location.origin + window.location.pathname + "?ref=" + user.uid;
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    const data = snap.val();
                    document.getElementById('mainBalance').innerText = "₦" + (data ? data.balance || 0 : 0);
                });
                loadTasks();
            } else { window.location.href = "index.html"; }
        });

                function loadTasks() {
            const uid = auth.currentUser.uid;
            
            // First, get the user's submissions to see what they've finished
            get(ref(db, `submissions/${uid}`)).then((userSubSnap) => {
                const userFinishedTasks = userSubSnap.val() || {};

                onValue(ref(db, 'tasks'), (snap) => {
                    const tasks = snap.val();
                    const list = document.getElementById('taskList');
                    list.innerHTML = "";
                    if(!tasks) { list.innerHTML = "<p class='text-center text-gray-500 py-10 text-xs italic'>No tasks available.</p>"; return; }
                    
                    for (let id in tasks) {
                        const isFinished = userFinishedTasks[id];
                        const isFull = tasks[id].completed >= tasks[id].limit;

                        // OPTION A: If finished, show "COMPLETED" and disable button
                        if (isFinished) {
                            list.innerHTML += `
                                <div class="bg-gray-800 p-5 rounded-2xl border border-green-900/50 opacity-60">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <h3 class="font-bold text-gray-400">${tasks[id].title}</h3>
                                            <p class="text-green-500 font-bold text-xs uppercase tracking-widest">Completed ✓</p>
                                        </div>
                                    </div>
                                </div>
                            `;
                        } 
                        // OPTION B: If task is not finished by user but is FULL, don't show it at all
                        else if (isFull) {
                            continue; 
                        }
                        // OPTION C: Task is available
                        else {
                            list.innerHTML += `
                                <div class="bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-md">
                                    <div class="flex justify-between items-start mb-4">
                                        <div>
                                            <h3 class="font-bold text-gray-100">${tasks[id].title}</h3>
                                            <p class="text-blue-400 font-bold">₦${tasks[id].reward}</p>
                                        </div>
                                        <a href="${tasks[id].link}" target="_blank" class="bg-blue-600 text-white px-3 py-2 rounded-lg text-[10px] font-bold uppercase">Open Task</a>
                                    </div>
                                    <button onclick="submitTask('${id}', '${tasks[id].reward}')" class="w-full bg-white text-black py-3 rounded-xl text-[10px] font-black uppercase">Submit Proof</button>
                                </div>
                            `;
                        }
                    }
                });
            });
        }


        window.submitTask = (id, reward) => {
            const proof = prompt("Enter your username/proof for this task:");
            if(proof) {
                set(ref(db, `submissions/${auth.currentUser.uid}/${id}`), {
                    proof, reward, status: "pending", userEmail: auth.currentUser.email, date: new Date().toLocaleDateString()
                });
                alert("Submitted for review!");
            }
        };

        window.copyRef = () => {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link).then(() => alert("Referral link copied!"));
        };

        window.requestWithdrawal = async () => {
            const user = auth.currentUser;
            const snapshot = await get(ref(db, 'users/' + user.uid));
            const balance = snapshot.val() ? snapshot.val().balance || 0 : 0;
            if (balance < 100) { alert("You need at least ₦100 to withdraw."); }
            else {
                const bankDetails = prompt("Enter Bank Name & Account Number:");
                if (bankDetails) {
                    const refW = push(ref(db, 'withdrawals'));
                    await set(refW, { uid: user.uid, email: user.email, amount: balance, details: bankDetails, status: "pending" });
                    await set(ref(db, 'users/' + user.uid + '/balance'), 0);
                    alert("Withdrawal request sent!");
                }
            }
        };
    </script>
</body>
</html>
