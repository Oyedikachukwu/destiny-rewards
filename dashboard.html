<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-20">

    <div class="p-6 bg-gray-800 rounded-b-3xl shadow-lg border-b border-gray-700">
        <div class="flex justify-between items-center">
            <div>
                <p class="text-gray-400 text-sm">Welcome back,</p>
                <h2 id="userEmail" class="text-lg font-bold text-blue-400">Loading...</h2>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400">Total Balance</p>
                <h2 id="mainBalance" class="text-2xl font-black text-green-400">₦0.00</h2>
            </div>
        </div>
    </div>

    <main class="p-4 space-y-6">
        
        <div class="bg-blue-900/30 border border-blue-500/50 p-4 rounded-xl">
            <p class="text-xs font-bold text-blue-300 mb-2 uppercase">Refer & Earn ₦20</p>
            <p id="refLink" class="text-[10px] bg-black/40 p-2 rounded truncate mb-2 text-gray-300">Loading link...</p>
            <button onclick="copyRef()" class="text-xs bg-blue-600 px-3 py-1 rounded-md font-bold">Copy Link</button>
        </div>

        <section>
            <h3 class="text-lg font-bold mb-3 flex items-center">
                <i class="fas fa-tasks mr-2 text-yellow-500"></i> Available Tasks
            </h3>
            <div id="taskList" class="space-y-3">
                <p class="text-gray-500 text-sm italic">Looking for new tasks...</p>
            </div>
        </section>

        <section class="bg-gray-800 p-5 rounded-2xl border border-gray-700">
            <h3 class="text-md font-bold mb-3">Withdraw Funds</h3>
            <p class="text-xs text-gray-400 mb-4">Minimum withdrawal is ₦100. Payments are processed manually.</p>
            <button onclick="requestWithdrawal()" class="w-full bg-green-600 hover:bg-green-700 p-3 rounded-xl font-bold transition">
                Withdraw to Bank
            </button>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-4">
        <button class="text-blue-400"><i class="fas fa-home text-xl"></i></button>
        <button onclick="window.location.href='history.html'" class="text-gray-500"><i class="fas fa-history text-xl"></i></button>
        <button onclick="window.location.href='profile.html'" class="text-gray-500"><i class="fas fa-user-circle text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('refLink').innerText = window.location.origin + "/index.html?ref=" + user.uid;
                
                // Load Balance
                onValue(ref(db, 'users/' + user.uid), (snapshot) => {
                    const data = snapshot.val();
                    document.getElementById('mainBalance').innerText = "₦" + (data.balance || 0);
                });

                // Load Tasks
                loadTasks(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        function loadTasks(uid) {
            onValue(ref(db, 'tasks'), (snapshot) => {
                const tasks = snapshot.val();
                const container = document.getElementById('taskList');
                container.innerHTML = "";
                
                for (let id in tasks) {
                    const task = tasks[id];
                    container.innerHTML += `
                        <div class="bg-gray-800 p-4 rounded-xl flex justify-between items-center border border-gray-700">
                            <div>
                                <h4 class="font-bold">${task.title}</h4>
                                <p class="text-green-400 text-sm font-bold">₦${task.reward}</p>
                            </div>
                            <button onclick="submitTask('${id}', '${task.reward}')" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold">Submit</button>
                        </div>
                    `;
                }
            });
        }

        window.submitTask = (taskId, reward) => {
            const proof = prompt("Enter proof of completion (e.g., your username used for task):");
            if (proof) {
                const user = auth.currentUser;
                const submissionRef = ref(db, 'submissions/' + user.uid + '/' + taskId);
                set(submissionRef, {
                    taskId: taskId,
                    proof: proof,
                    reward: reward,
                    status: "pending",
                    userEmail: user.email
                });
                alert("Task submitted! Waiting for Destiny to approve.");
            }
        };

        window.copyRef = () => {
            const link = document.getElementById('refLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Referral link copied!");
        };

        window.requestWithdrawal = async () => {
            const user = auth.currentUser;
            const snapshot = await get(ref(db, 'users/' + user.uid));
            const balance = snapshot.val().balance || 0;

            if (balance < 100) {
                alert("You need at least ₦100 to withdraw.");
            } else {
                const bankDetails = prompt("Enter your Bank Name and Account Number:");
                if (bankDetails) {
                    const newWithdrawalRef = push(ref(db, 'withdrawals'));
                    set(newWithdrawalRef, {
                        uid: user.uid,
                        email: user.email,
                        amount: balance,
                        details: bankDetails,
                        status: "pending"
                    });
                    // Reset balance to 0 after request
                    set(ref(db, 'users/' + user.uid + '/balance'), 0);
                    alert("Withdrawal request sent!");
                }
            }
        };
    </script>
</body>
</html>
