<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History | Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-24">
    <div class="p-6">
        <h1 class="text-2xl font-bold">Activity History</h1>
        <p class="text-gray-500 text-sm">Track your tasks and withdrawals</p>
        
        <div id="historyList" class="mt-8 space-y-4">
            <p class="text-gray-600 italic">No history yet...</p>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-gray-800 border-t border-gray-700 flex justify-around p-4">
        <button onclick="window.location.href='dashboard.html'" class="text-gray-500"><i class="fas fa-tasks text-xl"></i></button>
        <button class="text-blue-500"><i class="fas fa-history text-xl"></i></button>
        <button onclick="window.location.href='profile.html'" class="text-gray-500"><i class="fas fa-user text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'submissions/' + user.uid), (snap) => {
                    const data = snap.val();
                    const list = document.getElementById('historyList');
                    if(data) {
                        list.innerHTML = "";
                        for(let id in data) {
                            list.innerHTML += `
                                <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 flex justify-between">
                                    <div>
                                        <p class="font-bold text-sm">Task Completion</p>
                                        <p class="text-[10px] text-gray-500">${data[id].date || ''}</p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-blue-400 font-bold">₦${data[id].reward}</p>
                                        <p class="text-[10px] uppercase text-yellow-500">${data[id].status}</p>
                                    </div>
                                </div>
                            `;
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
