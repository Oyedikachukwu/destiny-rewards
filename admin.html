<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-6">

    <h1 class="text-3xl font-black text-blue-500 mb-8 underline">Admin Control Panel</h1>

    <div class="mb-12">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-yellow-500 w-3 h-3 rounded-full"></span> Pending Withdrawals
        </h2>
        <div id="admin-withdrawals" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <div>
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
            <span class="bg-blue-500 w-3 h-3 rounded-full"></span> Task Submissions
        </h2>
        <div id="admin-tasks" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPNnetnZPNJ7k3ympejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 1. Fetch Pending Withdrawals
        onValue(ref(db, 'withdrawals'), (snapshot) => {
            const container = document.getElementById('admin-withdrawals');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                if (data.status !== "Pending") return; // Only show what needs action

                container.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                        <p class="text-blue-400 font-bold">${data.email}</p>
                        <p class="text-2xl font-black my-2">₦${data.amount}</p>
                        <p class="text-sm text-gray-400">${data.bank} | ${data.accountNumber} | ${data.accountName}</p>
                        <div class="mt-4 flex gap-3">
                            <button onclick="changeStatus('withdrawals', '${child.key}', 'Paid')" class="bg-green-600 flex-1 py-2 rounded-lg font-bold">Approve</button>
                            <button onclick="changeStatus('withdrawals', '${child.key}', 'Rejected')" class="bg-red-600 flex-1 py-2 rounded-lg font-bold">Reject</button>
                        </div>
                    </div>`;
            });
        });

        // 2. Fetch Pending Tasks
        onValue(ref(db, 'taskSubmissions'), (snapshot) => {
            const container = document.getElementById('admin-tasks');
            container.innerHTML = "";
            snapshot.forEach((child) => {
                const data = child.val();
                if (data.status !== "Pending") return;

                container.innerHTML += `
                    <div class="bg-gray-900 border border-gray-800 p-5 rounded-2xl">
                        <p class="font-bold text-gray-300">User: ${data.email}</p>
                        <p class="text-lg text-blue-400 font-bold">Task: ${data.taskName}</p>
                        <div class="mt-4 flex gap-3">
                            <button onclick="changeStatus('taskSubmissions', '${child.key}', 'Approved')" class="bg-green-600 flex-1 py-2 rounded-lg font-bold">Approve</button>
                            <button onclick="changeStatus('taskSubmissions', '${child.key}', 'Rejected')" class="bg-red-600 flex-1 py-2 rounded-lg font-bold">Reject</button>
                        </div>
                    </div>`;
            });
        });

        // Global Action Function
        window.changeStatus = (folder, id, newStatus) => {
            update(ref(db, `${folder}/${id}`), { status: newStatus })
            .then(() => alert("Status updated to: " + newStatus))
            .catch((err) => alert("Error: " + err.message));
        };
    </script>
</body>
</html>
