<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Rewards - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-900 pb-20">

    <div class="bg-[#1a2a3a] text-white p-6 text-center shadow-lg">
        <h1 class="text-xl font-bold uppercase">Destiny Admin Panel</h1>
    </div>

    <div class="flex bg-[#243b55] sticky top-0 z-50 shadow-md">
        <button onclick="showTab('post')" class="flex-1 p-4 text-[10px] font-bold text-blue-300 active-tab" id="btn-post">POST</button>
        <button onclick="showTab('manage')" class="flex-1 p-4 text-[10px] font-bold text-gray-400" id="btn-manage">TASKS</button>
        <button onclick="showTab('approvals')" class="flex-1 p-4 text-[10px] font-bold text-gray-400" id="btn-approvals">APPROVALS</button>
        <button onclick="showTab('payouts')" class="flex-1 p-4 text-[10px] font-bold text-gray-400" id="btn-payouts">PAYOUTS</button>
    </div>

    <div class="max-w-md mx-auto p-4">
        <div id="post" class="tab-content block">
            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                <h2 class="font-bold mb-4">Create New Task</h2>
                <div class="space-y-3">
                    <input type="text" id="tName" placeholder="Task Name" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="text" id="tLink" placeholder="Task URL" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="number" id="tPrice" placeholder="Reward Amount" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="number" id="tLimit" placeholder="How many people? (e.g. 100)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <button onclick="postTask()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold uppercase">Publish Task</button>
                </div>
            </div>
        </div>

        <div id="manage" class="tab-content hidden">
            <h2 class="font-bold mb-4">Active Tasks</h2>
            <div id="taskList" class="space-y-3"></div>
        </div>

        <div id="approvals" class="tab-content hidden"><div id="approvalsList" class="space-y-4"></div></div>

        <div id="payouts" class="tab-content hidden"><div id="payoutsList" class="space-y-4"></div></div>
    </div>

    <style>.active-tab { border-bottom: 2px solid #2ecc71; color: white !important; }</style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.replace('block', 'hidden'));
            ['post', 'manage', 'approvals', 'payouts'].forEach(b => document.getElementById('btn-'+b).classList.remove('active-tab'));
            document.getElementById(id).classList.replace('hidden', 'block');
            document.getElementById('btn-'+id).classList.add('active-tab');
        };

        window.postTask = () => {
            const title = document.getElementById('tName').value;
            const link = document.getElementById('tLink').value;
            const reward = document.getElementById('tPrice').value;
            const limit = document.getElementById('tLimit').value;
            if(title && link && reward && limit) {
                const newRef = push(ref(db, 'tasks'));
                set(newRef, { title, link, reward, limit: parseInt(limit), completed: 0 }).then(() => {
                    alert("Task Posted!");
                    location.reload();
                });
            }
        };

        onValue(ref(db, 'tasks'), (snap) => {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const data = snap.val();
            for(let id in data) {
                list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-sm border mb-2">
                    <div class="flex justify-between">
                        <span class="font-bold">${data[id].title}</span>
                        <button onclick="delTask('${id}')" class="text-red-500 font-bold">Delete</button>
                    </div>
                    <p class="text-[10px] text-gray-500 mt-2">Completed: ${data[id].completed || 0} / ${data[id].limit}</p>
                </div>`;
            }
        });
        // Universal function to handle rejections
function rejectRequest(path, requestId) {
    const reason = prompt("Enter reason for rejection (optional):");
    if (reason === null) return; // User cancelled

    firebase.database().ref(path + '/' + requestId).update({
        status: "Rejected",
        adminNote: reason
    }).then(() => {
        alert("Request rejected.");
        location.reload();
    });
}
        

        window.delTask = (id) => { if(confirm("Delete?")) remove(ref(db, 'tasks/' + id)); };

        // APPROVALS
        onValue(ref(db, 'submissions'), (snap) => {
            const list = document.getElementById('approvalsList');
            list.innerHTML = "";
            const users = snap.val();
            if(!users) return;
            for(let uid in users) {
                for(let tid in users[uid]) {
                    const s = users[uid][tid];
                    if(s.status === "pending") {
                        list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-blue-500">
                            <p class="text-xs text-gray-400">${s.userEmail}</p>
                            <p class="font-bold text-sm">Proof: ${s.proof}</p>
                            <button onclick="payUser('${uid}', '${tid}', '${s.reward}')" class="w-full bg-blue-600 text-white p-2 rounded-lg mt-2 font-bold uppercase text-xs">Approve & Pay</button>
                        </div>`;
                    }
                }
            }
        });

        window.payUser = async (uid, tid, reward) => {
            const balanceRef = ref(db, `users/${uid}/balance`);
            const snap = await get(balanceRef);
            const current = snap.val() || 0;
            
            // 1. Pay user 2. Update status 3. Update global task counter
            await update(ref(db, `users/${uid}`), { balance: current + parseFloat(reward) });
            await update(ref(db, `submissions/${uid}/${tid}`), { status: "approved" });
            
            // Increment completion count
            const taskCountRef = ref(db, `tasks/${tid}/completed`);
            const countSnap = await get(taskCountRef);
            await set(taskCountRef, (countSnap.val() || 0) + 1);

            alert("Approved!");
        };

        // PAYOUTS (Same as previous version)
        onValue(ref(db, 'withdrawals'), (snap) => {
            const list = document.getElementById('payoutsList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            for(let id in data) {
                const w = data[id];
                if(w.status === "pending") {
                    list.innerHTML += `<div class="bg-white p-4 rounded-xl shadow-md border-l-4 border-green-500">
                        <p class="text-xl font-black text-green-600">₦${w.amount}</p>
                        <p class="text-[10px]"><strong>Bank:</strong> ${w.bank} | <strong>Acc:</strong> ${w.accountNumber}</p>
                        <p class="text-[10px]"><strong>Name:</strong> ${w.accountName}</p>
                        <button onclick="markPaid('${id}')" class="w-full bg-green-600 text-white p-2 rounded-lg mt-2 font-bold uppercase text-xs">Confirm Paid</button>
                    </div>`;
                }
            }
        });

        window.markPaid = (id) => {
            if(confirm("Confirm Paid?")) update(ref(db, `withdrawals/${id}`), { status: "approved" });
        };
    </script>
</body>
</html>
