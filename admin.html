<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-5">

    <div class="max-w-md mx-auto space-y-6">
        <div class="bg-blue-600 p-6 rounded-3xl text-center shadow-lg shadow-blue-900/20">
            <p class="text-blue-200 text-xs font-bold uppercase tracking-wider">Available Balance</p>
            <h2 id="currentBalance" class="text-4xl font-black mt-1">₦0</h2>
        </div>

        <div class="space-y-3 bg-gray-900 p-5 rounded-3xl border border-gray-800">
            <input type="number" id="wAmount" placeholder="Amount (Min ₦100)" class="w-full bg-black p-4 rounded-2xl border border-gray-800 focus:border-blue-500 outline-none">
            <input type="text" id="wBank" placeholder="Bank Name" class="w-full bg-black p-4 rounded-2xl border border-gray-800 focus:border-blue-500 outline-none">
            <input type="number" id="wAcc" placeholder="Account Number" class="w-full bg-black p-4 rounded-2xl border border-gray-800 focus:border-blue-500 outline-none">
            <input type="text" id="wName" placeholder="Account Name" class="w-full bg-black p-4 rounded-2xl border border-gray-800 focus:border-blue-500 outline-none">
            <button onclick="submitWithdraw()" class="w-full bg-blue-600 py-4 rounded-2xl font-black hover:bg-blue-500 transition">REQUEST WITHDRAWAL</button>
        </div>

        <div>
            <h3 class="font-bold text-xl mb-4">Withdrawal History</h3>
            <div id="history-list" class="space-y-3">
                <p class="text-gray-600 text-sm italic">No records found...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPNnetnZPNJ7k3ympejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = "index.html"; return; }

            // Balance Watcher
            onValue(ref(db, 'users/' + user.uid), (snap) => {
                userBalance = snap.val()?.balance || 0;
                document.getElementById('currentBalance').innerText = "₦" + userBalance;
            });

            // History Watcher
            const q = query(ref(db, 'withdrawals'), orderByChild('uid'), equalTo(user.uid));
            onValue(q, (snapshot) => {
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                if (!snapshot.exists()) { list.innerHTML = "<p class='text-gray-600'>No history yet.</p>"; return; }
                
                snapshot.forEach((child) => {
                    const d = child.val();
                    let color = d.status === "Paid" ? "text-green-500" : (d.status === "Rejected" ? "text-red-500" : "text-yellow-500");
                    list.innerHTML += `
                        <div class="bg-gray-900 p-4 rounded-2xl border border-gray-800 flex justify-between">
                            <div><p class="font-bold text-lg">₦${d.amount}</p><p class="text-xs text-gray-500">${d.bank}</p></div>
                            <div class="text-right"><p class="${color} font-black text-xs uppercase">${d.status || 'Pending'}</p></div>
                        </div>`;
                });
            });
        });

        window.submitWithdraw = async () => {
            const amt = parseInt(document.getElementById('wAmount').value);
            const bank = document.getElementById('wBank').value;
            const acc = document.getElementById('wAcc').value;
            const name = document.getElementById('wName').value;
            const user = auth.currentUser;

            if (!amt || !bank || !acc || !name) return alert("Fill everything!");
            if (amt < 100) return alert("Min ₦100");
            if (amt > userBalance) return alert("Insufficient funds!");

            const newRef = push(ref(db, 'withdrawals'));
            await set(newRef, {
                uid: user.uid, email: user.email, amount: amt,
                bank: bank, accountNumber: acc, accountName: name,
                status: "Pending", time: Date.now()
            });

            await set(ref(db, `users/${user.uid}/balance`), userBalance - amt);
            alert("Request sent!");
        };
    </script>
</body>
</html>
