<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Rewards Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        
        /* Mobile Friendly Header Menu */
        .admin-nav { 
            background: #2c3e50; 
            display: flex; 
            overflow-x: auto; 
            position: sticky; 
            top: 0; 
            z-index: 100;
        }
        .admin-nav button {
            flex: 0 0 auto;
            background: none;
            border: none;
            color: white;
            padding: 15px;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
        }
        .admin-nav button.active-btn { background: #34495e; border-bottom: 3px solid #27ae60; }

        .container { padding: 15px; max-width: 600px; margin: auto; }
        
        .section { display: none; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .active-section { display: block; }

        h2 { margin-top: 0; color: #333; font-size: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        
        .btn-main { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; font-weight: bold; font-size: 16px; }
        .card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .btn-red { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="admin-nav">
    <button id="btn1" class="active-btn" onclick="openTab('post-task', 'btn1')">➕ Post</button>
    <button id="btn2" onclick="openTab('manage-tasks', 'btn2')">⚙️ Manage</button>
    <button id="btn3" onclick="openTab('approvals', 'btn3')">✅ Approvals</button>
    <button id="btn4" onclick="openTab('withdrawals', 'btn4')">💰 Payouts</button>
</div>

<div class="container">
    <div id="post-task" class="section active-section">
        <h2>Post New Task</h2>
        <label>Task Name</label>
        <input type="text" id="tName" placeholder="e.g. Subscribe to YouTube">
        
        <label>Link/URL</label>
        <input type="url" id="tLink" placeholder="https://...">
        
        <label>Reward Amount</label>
        <input type="number" id="tReward" placeholder="0.50">
        
        <label>Max Persons (Limit)</label>
        <input type="number" id="tLimit" placeholder="100">
        
        <button class="btn-main" onclick="saveTask()">Publish Task</button>
    </div>

    <div id="manage-tasks" class="section">
        <h2>Active Tasks</h2>
        <div id="taskList">Loading...</div>
    </div>

    <div id="approvals" class="section">
        <h2>Task Approvals</h2>
        <div id="approvalList">No pending tasks.</div>
    </div>

    <div id="withdrawals" class="section">
        <h2>Withdrawal Requests</h2>
        <div id="withdrawalList">No pending requests.</div>
    </div>
</div>

<script>
    // --- 1. CONFIG (Paste your Firebase info here) ---
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- 2. TAB LOGIC ---
    function openTab(sectionId, btnId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.admin-nav button').forEach(b => b.classList.remove('active-btn'));
        document.getElementById(sectionId).classList.add('active-section');
        document.getElementById(btnId).classList.add('active-btn');
    }
