<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny Rewards - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-900 pb-20">

    <div class="bg-[#1a2a3a] text-white p-6 text-center shadow-lg">
        <h1 class="text-xl font-bold tracking-tighter uppercase">Destiny Admin Panel</h1>
    </div>

    <div class="flex bg-[#243b55] sticky top-0 z-50 shadow-md">
        <button onclick="showTab('post')" class="flex-1 p-4 text-xs font-bold text-blue-300 border-b-2 border-transparent active-tab" id="btn-post">POST</button>
        <button onclick="showTab('manage')" class="flex-1 p-4 text-xs font-bold text-gray-400" id="btn-manage">TASKS</button>
        <button onclick="showTab('approvals')" class="flex-1 p-4 text-xs font-bold text-gray-400" id="btn-approvals">APPROVALS</button>
        <button onclick="showTab('payouts')" class="flex-1 p-4 text-xs font-bold text-gray-400" id="btn-payouts">PAYOUTS</button>
    </div>

    <div class="max-w-md mx-auto p-4">

        <div id="post" class="tab-content block">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="font-bold mb-4 text-gray-700">Create New Task</h2>
                <div class="space-y-3">
                    <input type="text" id="tName" placeholder="Task Name" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="text" id="tLink" placeholder="Task URL (https://...)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <input type="number" id="tPrice" placeholder="Reward Amount (e.g. 50)" class="w-full p-3 bg-gray-50 border rounded-xl outline-none">
                    <button onclick="postTask()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-lg shadow-green-200">Publish Task</button>
                </div>
            </div>
        </div>

        <div id="manage" class="tab-content hidden">
            <h2 class="font-bold mb-4">Active Tasks</h2>
            <div id="taskList" class="space-y-3 text-sm text-gray-500 italic text-center">Loading...</div>
        </div>

        <div id="approvals" class="tab-content hidden">
            <h2 class="font-bold mb-4">Pending Submissions</h2>
            <div id="approvalsList" class="space-y-4 text-sm text-gray-500 italic text-center">No pending tasks...</div>
        </div>

        <div id="payouts" class="tab-content hidden">
            <h2 class="font-bold mb-4">Withdrawal Requests</h2>
            <div id="payoutsList" class="space-y-4 text-sm text-gray-500 italic text-center">No pending payouts...</div>
        </div>

    </div>

    <style>
        .active-tab { border-bottom-color: #2ecc71; color: white !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- TAB LOGIC ---
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.replace('block', 'hidden'));
            document.querySelectorAll('.nav-bar button').forEach(b => b.classList.remove('active-tab')); // Old logic fallback
            document.getElementById(id).classList.replace('hidden', 'block');
            
            // UI Visuals
            const buttons = ['post', 'manage', 'approvals', 'payouts'];
            buttons.forEach(b => document.getElementById('btn-'+b).classList.remove('active-tab'));
            document.getElementById('btn-'+id).classList.add('active-tab');
        };

        // --- POST TASK ---
        window.postTask = () => {
            const title = document.getElementById('tName').value;
            const link = document.getElementById('tLink').value;
            const reward = document.getElementById('tPrice').value;

            if(title && link && reward) {
                const newRef = push(ref(db, 'tasks'));
                set(newRef, { title, link, reward, status: "active" })
                .then(() => {
                    alert("Task Live!");
                    document.getElementById('tName').value = "";
                    document.getElementById('tLink').value = "";
                    document.getElementById('tPrice').value = "";
                });
            } else { alert("Empty fields!"); }
        };

        // --- MANAGE TASKS ---
        onValue(ref(db, 'tasks'), (snap) => {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            for(let id in data) {
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-xl flex justify-between items-center shadow-sm mb-2 border border-gray-100">
                        <span class="font-bold text-gray-700 text-xs">${data[id].title} (₦${data[id].reward})</span>
                        <button onclick="delTask('${id}')" class="text-red-500 text-xs font-black uppercase">Delete</button>
                    </div>
                `;
            }
        });

        window.delTask = (id) => { if(confirm("Delete task?")) remove(ref(db, 'tasks/' + id)); };

        // --- APPROVALS (PAYOUT FOR TASKS) ---
        onValue(ref(db, 'submissions'), (snap) => {
            const list = document.getElementById('approvalsList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) { list.innerHTML = "No submissions."; return; }
            for(let uid in data) {
                for(let tid in data[uid]) {
                    const s = data[uid][tid];
                    if(s.status === "pending") {
                        list.innerHTML += `
                            <div class="bg-white p-5 rounded-2xl shadow-md border-l-4 border-blue-500 text-left">
                                <p class="text-[10px] text-gray-400 font-bold uppercase mb-1">User: ${s.userEmail}</p>
                                <p class="text-sm font-black mb-2">Proof: ${s.proof}</p>
                                <button onclick="payUser('${uid}', '${tid}', '${s.reward}')" class="w-full bg-blue-600 text-white p-3 rounded-lg text-xs font-bold">APPROVE & PAY ₦${s.reward}</button>
                            </div>
                        `;
                    }
                }
            }
        });

        window.payUser = async (uid, tid, reward) => {
            const balanceRef = ref(db, `users/${uid}/balance`);
            const statusRef = ref(db, `submissions/${uid}/${tid}/status`);
            
            const userSnap = await get(balanceRef);
            const currentBal = userSnap.val() || 0;
            
            await update(ref(db, `users/${uid}`), { balance: currentBal + parseFloat(reward) });
            await set(statusRef, "approved");
            alert("Payment added to user balance!");
        };

        // --- WITHDRAWALS (BANK PAYMENTS) ---
        onValue(ref(db, 'withdrawals'), (snap) => {
            const list = document.getElementById('payoutsList');
            list.innerHTML = "";
            const data = snap.val();
            if(!data) { list.innerHTML = "No requests."; return; }
            for(let id in data) {
                const w = data[id];
                if(w.status === "pending") {
                    list.innerHTML += `
                        <div class="bg-white p-5 rounded-2xl shadow-md border-l-4 border-green-500 text-left space-y-2">
                            <p class="text-lg font-black text-green-600">₦${w.amount}</p>
                            <p class="text-xs"><strong>Bank:</strong> ${w.bank}</p>
                            <p class="text-xs"><strong>Acc:</strong> ${w.accountNumber}</p>
                            <p class="text-xs"><strong>Holder:</strong> ${w.accountName}</p>
                            <button onclick="markPaid('${id}')" class="w-full bg-green-600 text-white p-3 rounded-lg text-xs font-bold uppercase">Confirm Paid</button>
                        </div>
                    `;
                }
            }
        });

        window.markPaid = (id) => {
            if(confirm("Confirm manual bank transfer done?")) {
                update(ref(db, `withdrawals/${id}`), { status: "paid" });
                alert("Marked as Paid!");
            }
        };

    </script>
</body>
</html>
