<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw | Destiny Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white pb-24">
    <div class="p-6 text-center bg-gray-800 border-b border-gray-700">
        <h1 class="text-xl font-bold">Withdraw Funds</h1>
    </div>

    <main class="p-6 space-y-4">
        <div class="bg-blue-900/20 p-6 rounded-3xl text-center border border-blue-500/30">
            <p class="text-xs text-blue-400 font-bold uppercase">Balance</p>
            <h2 id="currentBalance" class="text-4xl font-black mt-2">₦0</h2>
        </div>

        <input type="number" id="wAmount" placeholder="Amount (Min ₦100)" class="w-full bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
        <input type="text" id="wBank" placeholder="Bank Name (e.g. OPay)" class="w-full bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
        <input type="number" id="wAcc" placeholder="Account Number" class="w-full bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">
        <input type="text" id="wName" placeholder="Account Holder Name" class="w-full bg-gray-800 p-4 rounded-2xl outline-none border border-gray-700">

        <button onclick="submitWithdraw()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase shadow-lg">Confirm Withdrawal</button>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, get, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQXpPMNetnZPNJ7k3ywpejfNxCeGYxKZA",
            authDomain: "destiny-rewards.firebaseapp.com",
            databaseURL: "https://destiny-rewards-default-rtdb.firebaseio.com",
            projectId: "destiny-rewards",
            storageBucket: "destiny-rewards.firebasestorage.app",
            messagingSenderId: "148315001010",
            appId: "1:148315001010:web:a0db78324d7b730858f9ab"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        let userBalance = 0;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onValue(ref(db, 'users/' + user.uid), (snap) => {
                    userBalance = snap.val() ? snap.val().balance || 0 : 0;
                    document.getElementById('currentBalance').innerText = "₦" + userBalance;
                });
            } else { window.location.href = "index.html"; }
        });

        window.submitWithdraw = async () => {
            const amount = parseInt(document.getElementById('wAmount').value);
            const bank = document.getElementById('wBank').value;
            const acc = document.getElementById('wAcc').value;
            const name = document.getElementById('wName').value;

            if(!amount || !bank || !acc || !name) { alert("Fill all details!"); return; }
            if(amount < 100) { alert("Min ₦100"); return; }
            if(amount > userBalance) { alert("Insufficient funds!"); return; }

            const user = auth.currentUser;
            const wRef = push(ref(db, 'withdrawals'));
            await set(wRef, {
                uid: user.uid, email: user.email, amount, bank, accountNumber: acc, accountName: name, status: "pending", date: new Date().toLocaleDateString()
            });
            await set(ref(db, 'users/' + user.uid + '/balance'), userBalance - amount);
            alert("Request Sent!");
            window.location.href = "dashboard.html";
        };
    </script>
</body>
</html>
